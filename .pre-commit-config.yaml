# Prek configuration for Java project
repos:
  - repo: local
    hooks:
      - id: gradle-spotless-apply
        name: Gradle Spotless (format)
        entry: ./gradlew
        language: system
        args: [ "spotlessApply" ]
        pass_filenames: false

      - id: checkstyle
        name: Checkstyle
        entry: ./gradlew
        language: system
        args: [ "checkstyleAll", "--quiet" ]
        pass_filenames: false
        
      - id: snyk-code-scan
        name: Snyk code scan
        entry: snyk
        language: system
        args: [ "code", "test" ]
        pass_filenames: false

  # Ministry of Justice DevSecOps hooks for secret detection
  # Not supporting custom api tokens of PDA service
  - repo: https://github.com/ministryofjustice/devsecops-hooks
    rev: v1.4.0
    hooks:
      - id: baseline
        # Exclude directories that are not part of the codebase
        exclude: |
          (?x)^(
            build/|
            .gradle/|
            .idea/|
            .git/|
          )